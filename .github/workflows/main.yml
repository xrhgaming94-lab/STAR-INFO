name: 🔄 JWT Token Generator (India Time GMT+5:30)

on:
  schedule:
  - cron: '0 */3 * * *'  # 🕰️ Har 3 ghante par (12:00, 3:00, 6:00, 9:00 AM/PM IST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ⚙️ Run JWT Token Generator Script
        run: |
          echo "🚀 Running token generation script at $(date)"
          python main.py

      - name: 📤 Commit & Push Token Files
        env:
          PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "🔄 Update JWT tokens - $(date +'%Y-%m-%d %H:%M:%S IST')"
            git pull --rebase origin main || true
            git push https://x-access-token:${PAT}@github.com/${{ github.repository }}.git
          else
            echo "✨ No changes to commit."
          fi